name: Update Guestbook

on:
  issue_comment:
    types: [created]

jobs:
  update-guestbook:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'guestbook') && github.event.comment.user.type != 'Bot'
    
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update README.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = context.payload.comment.body;
            const user = context.payload.comment.user.login;
            const avatar = context.payload.comment.user.avatar_url;
            const userUrl = context.payload.comment.user.html_url;

            const cleanComment = comment.replace(/\r?\n|\r/g, " ").substring(0, 140);
            const newEntry = `| <img src="${avatar}" width="40" height="40" style="border-radius:50%" /> | [@${user}](${userUrl}) | *${cleanComment}* |`;

            let readme = fs.readFileSync('README.md', 'utf8');
            
            // Regex que ignora espaços extras entre os traços e o texto
            const startTagRegex = //i;
            const endTagRegex = //i;

            if (startTagRegex.test(readme) && endTagRegex.test(readme)) {
              // Substitui a tag de início por ela mesma + a nova linha
              const updatedReadme = readme.replace(startTagRegex, `\n${newEntry}`);
              fs.writeFileSync('README.md', updatedReadme);
            } else {
              console.log("Conteúdo do README lido:\n", readme);
              throw new Error('Tags não encontradas! Verifique se digitou exatamente assim.');
            }

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git commit -m "📝 guestbook: @${{ github.event.comment.user.login }}" || exit 0
          git push
